name: Movena iOS smoke build

on:
  workflow_dispatch:
  push:
    branches:
      - codex/**
    paths:
      - '.github/workflows/movena-ios-smoke.yml'
      - 'Podfile'
      - 'Podfile.lock'
      - 'NextcloudTalk.xcodeproj/**'
      - 'NextcloudTalk/**'
      - 'NextcloudTalkTests/**'
      - 'NotificationServiceExtension/**'
      - 'ShareExtension/**'
      - 'BroadcastUploadExtension/**'
      - 'TalkIntents/**'
  pull_request:
    paths:
      - '.github/workflows/movena-ios-smoke.yml'
      - 'Podfile'
      - 'Podfile.lock'
      - 'NextcloudTalk.xcodeproj/**'
      - 'NextcloudTalk/**'
      - 'NextcloudTalkTests/**'
      - 'NotificationServiceExtension/**'
      - 'ShareExtension/**'
      - 'BroadcastUploadExtension/**'
      - 'TalkIntents/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  WORKSPACE: NextcloudTalk.xcworkspace
  SCHEME: NextcloudTalk
  DESTINATION: platform=iOS Simulator,name=iPhone 17,OS=26.5
  SIMULATOR_MODEL: iPhone 17
  SIMULATOR_VERSION: "26.5"
  APP_BUNDLE_IDENTIFIER: com.nextcloud.Talk
  XCODE_VERSION: "26.5"
  DERIVED_DATA_PATH: DerivedData

jobs:
  smoke-build:
    name: Build for iOS Simulator
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout app
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: true

      - name: Setup Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Print runner diagnostics
        run: |
          sw_vers
          xcodebuild -version
          xcrun simctl list runtimes available
          xcrun simctl list devices available

      - name: Cache CocoaPods
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: Pods
          key: ${{ runner.os }}-movena-pods-${{ hashFiles('Podfile', 'Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-movena-pods-

      - name: Setup CocoaPods
        uses: maxim-lobanov/setup-cocoapods@8e97e1e98e6ccf42564fdf5622c8feec74199377 # v1.4.0
        with:
          version: latest

      - name: Install dependencies
        run: pod install

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -workspace "${WORKSPACE}" \
            -scheme "${SCHEME}" \
            -destination "${DESTINATION}" \
            -derivedDataPath "${DERIVED_DATA_PATH}" \
            2>&1 | tee xcodebuild.log

      - name: Boot simulator
        uses: futureware-tech/simulator-action@e89aa8f93d3aec35083ff49d2854d07f7186f7f5 # v5.0.0
        with:
          model: ${{ env.SIMULATOR_MODEL }}
          os_version: ${{ env.SIMULATOR_VERSION }}
          wait_for_boot: true

      - name: Launch app in simulator and capture screenshots
        run: |
          set -euo pipefail

          mkdir -p simulator-screenshots

          APP_PATH=$(find "${DERIVED_DATA_PATH}/Build/Products" \
            -path "*Debug-iphonesimulator*.app" \
            -type d \
            -name "NextcloudTalk.app" \
            -print \
            -quit)

          if [ -z "${APP_PATH}" ]; then
            APP_PATH=$(find "${DERIVED_DATA_PATH}/Build/Products" \
              -path "*iphonesimulator*.app" \
              -type d \
              -not -path "*/PlugIns/*" \
              -print \
              -quit)
          fi

          if [ -z "${APP_PATH}" ]; then
            echo "No simulator app bundle found under ${DERIVED_DATA_PATH}/Build/Products"
            find "${DERIVED_DATA_PATH}/Build/Products" -maxdepth 4 -type d -name "*.app" -print
            exit 1
          fi

          echo "Installing app bundle: ${APP_PATH}"
          xcrun simctl list devices booted
          xcrun simctl install booted "${APP_PATH}"

          xcrun simctl screenshot booted simulator-screenshots/01-before-launch.png

          set +e
          xcrun simctl launch booted "${APP_BUNDLE_IDENTIFIER}" > simulator-launch.log 2>&1
          LAUNCH_STATUS=$?
          set -e

          cat simulator-launch.log

          if [ "${LAUNCH_STATUS}" -ne 0 ]; then
            echo "simctl launch failed with status ${LAUNCH_STATUS}"
            xcrun simctl screenshot booted simulator-screenshots/02-launch-failed.png
            exit "${LAUNCH_STATUS}"
          fi

          sleep 8
          xcrun simctl screenshot booted simulator-screenshots/02-after-launch.png

      - name: Upload xcodebuild log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: movena-ios-smoke-xcodebuild-log
          path: xcodebuild.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload simulator screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: movena-ios-smoke-screenshots
          path: simulator-screenshots
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload simulator launch log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: movena-ios-smoke-launch-log
          path: simulator-launch.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload simulator products
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: movena-ios-smoke-products
          path: DerivedData/Build/Products
          retention-days: 4
